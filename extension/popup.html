<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Term PTT Custom Theme</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="header-copy">
          <h1>Term PTT Custom Theme</h1>
          <p id="status">Loading colors...</p>
        </div>
        <button
          id="repositoryButton"
          class="repository-button"
          type="button"
          title="Open project repository"
          aria-label="Open project repository on GitHub"
        >
          <svg class="repository-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.06-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.45.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </button>
      </header>

      <section id="controls" class="controls" hidden>
        <section class="current-palette" aria-labelledby="currentPaletteHeading">
          <div class="palette-header">
            <div class="palette-title">
              <span id="currentPaletteHeading">Current Palette</span>
              <strong id="currentPaletteName">Loading...</strong>
            </div>
            <div class="palette-state">
              <span id="modifiedBadge" class="modified-badge" hidden>Modified</span>
              <button id="resetButton" class="inline-reset" type="button" hidden>Reset</button>
            </div>
          </div>
          <div id="paletteStrip" class="palette-strip" aria-label="Current palette colors"></div>
        </section>

        <label class="search">
          <span>Search Presets</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Gruvbox, Solarized, Dracula">
        </label>

        <div id="colorList" class="color-list" aria-label="Color presets"></div>

        <details id="webfontTagsPanel" class="webfont-tags">
          <summary>
            <span>Webfont Tags</span>
            <small id="webfontTagsSummary">Optional</small>
          </summary>
          <div class="webfont-tags-body">
            <textarea
              id="webfontTagsInput"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              maxlength="6000"
              placeholder="<link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin>
<link rel=&quot;stylesheet&quot; href=&quot;https://fonts.googleapis.com/css2?family=Noto+Sans+TC&quot;>

<style>
@font-face {
  font-family: &quot;My PTT Font&quot;;
  src: url(&quot;https://example.com/my-font.woff2&quot;) format(&quot;woff2&quot;);
}
</style>"
            ></textarea>
            <div class="webfont-tags-toolbar">
              <button id="insertWebfontTemplateButton" class="secondary-button" type="button">
                Insert webfont template
              </button>
              <button id="clearWebfontTagsButton" class="secondary-button" type="button">
                Clear
              </button>
            </div>
            <small id="webfontTagsStatus">
              Advanced: custom CSS can change term.ptt.cc. Paste only style tags and links you trust.
            </small>
          </div>
        </details>

        <footer class="actions">
          <button id="applyButton" type="button" disabled>Apply</button>
        </footer>
      </section>
    </main>
    <script src="ptt-colors.js"></script>
    <script src="ptt-webfont-tags.js"></script>
    <script src="appearance-state.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
